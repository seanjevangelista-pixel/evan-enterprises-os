<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Client Portal — Evan Enterprises</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0F1E;--bg2:#0D1426;--surface:#111827;--surface2:#1A2440;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.11);
  --text:#F9FAFB;--text2:rgba(255,255,255,0.52);--text3:rgba(255,255,255,0.28);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.10);--blue-mid:#2563EB;
  --purple:#8B5CF6;--purple-dim:rgba(139,92,246,0.10);
  --green:#10B981;--green-dim:rgba(16,185,129,0.10);
  --red:#EF4444;--amber:#F59E0B;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:12px;
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh}

/* ─── ANIMATIONS ───────────────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.fade-up{animation:fadeUp 0.5s cubic-bezier(.22,1,.36,1) both}
.fade-up-1{animation-delay:0.05s}
.fade-up-2{animation-delay:0.12s}
.fade-up-3{animation-delay:0.19s}
.fade-up-4{animation-delay:0.26s}
.fade-up-5{animation-delay:0.33s}
.fade-up-6{animation-delay:0.40s}

/* ─── LOGIN ────────────────────────────────────────────────────── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:36px;padding:24px;
  background:
    radial-gradient(ellipse 60% 50% at 30% 40%,rgba(59,130,246,0.08) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 70% 60%,rgba(139,92,246,0.06) 0%,transparent 70%),
    var(--bg);
}
.login-brand{display:flex;align-items:center;gap:14px;text-decoration:none}
.login-emark{
  width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,var(--blue),#1D4ED8);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(59,130,246,0.3);
}
.login-emark svg{width:22px;height:22px}
.login-wordmark{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:0.18em;color:var(--text)}
.login-sub{font-size:10px;color:var(--text3);letter-spacing:0.1em;margin-top:1px}
.login-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:36px;width:360px;max-width:100%;
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
  animation:fadeUp 0.4s cubic-bezier(.22,1,.36,1);
}
.login-card h2{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;margin-bottom:6px;text-transform:uppercase}
.lf input{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);
  font-family:var(--font-body);outline:none;transition:border-color 0.15s,box-shadow 0.15s;
}
.lf input::placeholder{color:var(--text3)}
.lf input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.btn-login{
  width:100%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));
  color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;
  font-family:var(--font-body);cursor:pointer;
  transition:opacity 0.15s,transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 20px rgba(59,130,246,0.3);margin-top:4px;
}
.btn-login:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,130,246,0.4)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.login-err{color:var(--red);font-size:12px;margin-top:10px;display:none;line-height:1.5}

/* ─── APP SHELL ────────────────────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column}
.app-nav{
  background:rgba(10,15,30,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:58px;position:sticky;top:0;z-index:50;
}
.app-nav-brand{display:flex;align-items:center;gap:12px}
.app-nav-mark{
  width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,var(--blue),#1D4ED8);
  display:flex;align-items:center;justify-content:center;
}
.app-nav-mark svg{width:16px;height:16px}
.app-nav-wordmark{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.16em}
.app-nav-right{display:flex;align-items:center;gap:14px}
.nav-biz-pill{
  font-size:11px;color:var(--text2);
  background:rgba(255,255,255,0.06);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;
}
.btn-signout{
  background:transparent;border:1px solid var(--border2);
  border-radius:6px;padding:6px 12px;color:var(--text3);font-size:12px;
  cursor:pointer;font-family:var(--font-body);transition:all 0.15s;
}
.btn-signout:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--border2)}

/* ─── BODY ─────────────────────────────────────────────────────── */
.portal-body{max-width:980px;margin:0 auto;padding:40px 24px 80px}
#loading{text-align:center;padding:100px 20px;color:var(--text3);font-size:13px}
.load-spinner{
  display:inline-block;width:24px;height:24px;border:2px solid rgba(255,255,255,0.08);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin 0.7s linear infinite;margin-bottom:16px;
}

/* ─── HERO STAT ────────────────────────────────────────────────── */
.hero-section{
  background:linear-gradient(135deg,rgba(59,130,246,0.08) 0%,rgba(139,92,246,0.05) 100%);
  border:1px solid rgba(59,130,246,0.15);
  border-radius:16px;padding:32px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.hero-section::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.1) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{font-size:10px;font-weight:600;color:var(--blue);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.hero-name{font-family:var(--font-display);font-size:clamp(22px,3vw,28px);font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--text2)}
.hero-big-num{
  font-family:var(--font-mono);font-size:clamp(48px,7vw,72px);
  font-weight:500;color:var(--green);line-height:1;
  margin:20px 0 6px;letter-spacing:-0.03em;
}
.hero-big-label{font-size:12px;color:var(--text3)}
.hero-delta{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;margin-top:8px;
  padding:4px 10px;border-radius:20px;
}
.hero-delta.up{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.hero-delta.down{background:rgba(239,68,68,0.08);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.hero-delta.neutral{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border2)}

/* ─── STAT GRID ────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);
  padding:18px 20px;transition:border-color 0.2s,transform 0.2s;
}
.stat-card:hover{border-color:rgba(255,255,255,0.18);transform:translateY(-2px)}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.stat-val{font-family:var(--font-mono);font-size:32px;font-weight:500;color:var(--text);line-height:1}
.stat-val.green{color:var(--green)}
.stat-val.blue{color:var(--blue)}
.stat-val.amber{color:var(--amber)}
.stat-val.purple{color:var(--purple)}
.stat-change{font-size:11px;color:var(--text3);margin-top:6px}
.stat-delta{display:inline-block;font-size:10px;font-weight:600;margin-top:6px;padding:2px 8px;border-radius:20px}
.stat-delta.up{background:var(--green-dim);color:var(--green)}
.stat-delta.down{background:rgba(239,68,68,0.08);color:var(--red)}
.stat-delta.neutral{color:var(--text3);background:none;padding:0}

/* ─── ACTIVITY CHART ────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.card-title{font-family:var(--font-display);font-size:13px;font-weight:600}
.card-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:0.04em;white-space:nowrap}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}
.badge-amber{background:rgba(245,158,11,0.10);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.badge-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(139,92,246,0.2)}
.badge-red{background:rgba(239,68,68,0.10);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.badge-muted{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border)}
.card-body{padding:20px}

/* Chart */
.chart-wrap{padding:0 20px 20px}
.chart-svg{width:100%;overflow:visible}
.chart-bar{fill:var(--blue);opacity:0.7;transition:opacity 0.15s;cursor:default;transform-origin:bottom;animation:barGrow 0.6s cubic-bezier(.22,1,.36,1) both}
.chart-bar:hover{opacity:1}
.chart-bar.today{fill:var(--green)}
.chart-label{font-family:var(--font-mono);font-size:9px;fill:var(--text3)}
.chart-tooltip{
  position:absolute;background:#1E2D4A;border:1px solid var(--border2);
  border-radius:7px;padding:6px 10px;font-size:12px;pointer-events:none;
  opacity:0;transition:opacity 0.12s;white-space:nowrap;z-index:10;
}

/* ─── LEADS FEED ────────────────────────────────────────────────── */
.leads-filter{display:flex;gap:8px;padding:0 20px 16px;flex-wrap:wrap}
.filter-btn{
  font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;color:var(--text3);
  cursor:pointer;font-family:var(--font-body);transition:all 0.15s;
}
.filter-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
.filter-btn.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,0.35)}

.leads-list{display:flex;flex-direction:column;gap:0}
.lead-row{
  display:grid;grid-template-columns:80px 1fr auto;align-items:center;
  gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);
  transition:background 0.12s;cursor:default;
}
.lead-row:last-child{border-bottom:none}
.lead-row:hover{background:rgba(255,255,255,0.02)}
.lead-date{font-family:var(--font-mono);font-size:11px;color:var(--text3)}
.lead-main{display:flex;align-items:center;gap:10px;min-width:0}
.lead-source{
  width:24px;height:24px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;
}
.lead-source.lsa{background:rgba(59,130,246,0.15);color:var(--blue)}
.lead-source.call{background:rgba(16,185,129,0.12);color:var(--green)}
.lead-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-type{font-size:11px;color:var(--text3);margin-top:1px}
.lead-phone{
  font-family:var(--font-mono);font-size:12px;color:var(--text3);
  text-decoration:none;transition:color 0.12s;
}
.lead-phone:hover{color:var(--green)}

/* ─── SERVICES ──────────────────────────────────────────────────── */
.services-list{display:flex;flex-wrap:wrap;gap:8px}
.svc-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-dim);border:1px solid rgba(59,130,246,0.2);
  border-radius:99px;padding:5px 14px;
  font-size:11px;font-weight:600;color:var(--blue);
}
.svc-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}

/* ─── INVOICES ──────────────────────────────────────────────────── */
.invoice-row{
  display:grid;grid-template-columns:1fr auto auto;align-items:center;
  gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);
}
.invoice-row:last-child{border-bottom:none}
.invoice-title{font-size:13px;font-weight:500;color:var(--text)}
.invoice-due{font-size:11px;color:var(--text3);margin-top:2px}
.invoice-amount{font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--text)}
.status{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:0.04em}
.status-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.status-amber{background:rgba(245,158,11,0.10);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.status-red{background:rgba(239,68,68,0.10);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.status-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}

/* ─── CONTACT ───────────────────────────────────────────────────── */
.contact-row{
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.contact-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),#1D4ED8);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;
}
.contact-name{font-size:15px;font-weight:600}
.contact-role{font-size:12px;color:var(--text3);margin-top:2px}
.contact-btns{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.contact-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  border-radius:8px;padding:9px 16px;color:var(--text2);
  font-size:12px;font-weight:500;text-decoration:none;
  transition:all 0.15s;font-family:var(--font-body);cursor:pointer;
}
.contact-btn:hover{background:rgba(255,255,255,0.1);color:var(--text);border-color:var(--border2)}

/* ─── EMPTY ──────────────────────────────────────────────────────── */
.empty-state{
  text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;line-height:1.7;
}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:0.5}
.empty-state strong{display:block;color:var(--text2);font-size:14px;margin-bottom:4px}

/* ─── SKELETON ───────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:4px;
}

/* ─── MOBILE ──────────────────────────────────────────────────────── */
@media(max-width:640px){
  .portal-body{padding:24px 16px 60px}
  .app-nav{padding:0 16px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stats-grid .stat-card:last-child{display:none}
  .contact-btns{margin-left:0;width:100%}
  .lead-row{grid-template-columns:68px 1fr}
  .lead-phone{display:none}
  .hero-big-num{font-size:52px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <a href="/" class="login-brand">
    <div class="login-emark">
      <svg viewBox="0 0 104 84" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,20 L14,0 L86,0 Q104,0 104,10 Q104,20 86,20 Z" fill="white" opacity="0.9"/>
        <path d="M0,52 L14,32 L86,32 Q104,32 104,42 Q104,52 86,52 Z" fill="white" opacity="0.7"/>
        <path d="M0,84 L14,64 L86,64 Q104,64 104,74 Q104,84 86,84 Z" fill="white" opacity="0.5"/>
      </svg>
    </div>
    <div>
      <div class="login-wordmark">EVAN ENTERPRISES</div>
      <div class="login-sub">CLIENT PORTAL</div>
    </div>
  </a>
  <div class="login-card">
    <h2>Sign in</h2>
    <p>Access your lead data, ad performance, and reports.</p>
    <div class="lf">
      <label>Email</label>
      <input type="email" id="p-email" placeholder="you@yourbusiness.com" autocomplete="email">
    </div>
    <div class="lf">
      <label>Password</label>
      <input type="password" id="p-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="p-login-btn" onclick="portalLogin()">Sign in →</button>
    <div class="login-err" id="p-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="app-nav">
    <div class="app-nav-brand">
      <div class="app-nav-mark">
        <svg viewBox="0 0 104 84" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,20 L14,0 L86,0 Q104,0 104,10 Q104,20 86,20 Z" fill="white" opacity="0.9"/>
          <path d="M0,52 L14,32 L86,32 Q104,32 104,42 Q104,52 86,52 Z" fill="white" opacity="0.7"/>
          <path d="M0,84 L14,64 L86,64 Q104,64 104,74 Q104,84 86,84 Z" fill="white" opacity="0.5"/>
        </svg>
      </div>
      <div class="app-nav-wordmark">EVAN ENTERPRISES</div>
    </div>
    <div class="app-nav-right">
      <div class="nav-biz-pill" id="portal-biz-name"></div>
      <button class="btn-signout" onclick="portalSignOut()">Sign out</button>
    </div>
  </nav>

  <div class="portal-body">
    <div id="loading"><div class="load-spinner"></div><br>Loading your dashboard…</div>
    <div id="portal-content" style="display:none"></div>
  </div>
</div>

<!-- Tooltip for chart -->
<div class="chart-tooltip" id="chart-tip"></div>

<script>
const SUPABASE_URL  = 'https://hzcgdnhecgewqpcnumwm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6Y2dkbmhlY2dld3FwY251bXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Nzk0MDgsImV4cCI6MjA5ODI1NTQwOH0.ZrpEnLvudbGYZJGf1Rr-cAEJkgbXX5Gvt9mWSAzYnW4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Auth ──────────────────────────────────────────────────────────
async function portalLogin() {
  const email = document.getElementById('p-email').value.trim();
  const pass  = document.getElementById('p-pass').value;
  const btn   = document.getElementById('p-login-btn');
  const err   = document.getElementById('p-err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    err.textContent = error.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in →';
    return;
  }
  showPortal();
}

async function showPortal() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  document.getElementById('login-screen').style.display = 'none';

      </div>

        <div class="stat-delta ${callsThisMo.length >= callsLastMo.length ? 'up' : 'down'}">
          ${callsThisMo.length >= callsLastMo.length ? '↑' : '↓'}

      </div>

    <!-- ALL LEADS FEED -->

      <div class="card-header">
        <div class="card-title">All Leads</div>

    <!-- SERVICES -->
    <div class="card fade-up fade-up-5">
      <div class="card-header">

      <div class="card-body">
        <div class="services-list">
          ${svcs.length
            ? svcs.map(([,v]) => `<span class="svc-chip"><span class="svc-dot"></span>${v[0]}</span>`).join('')

    <!-- INVOICES -->
    <div class="card fade-up fade-up-5">
      <div class="card-header">
        <div class="card-title">Invoices</div>

      </div>
      ${invoices.length ? `<div class="invoices-list">${invoices.map(i => {

          <div>
            <div class="contact-name">Sean Evangelista</div>

          </div>
          <div class="contact-btns">
            <a href="mailto:seanjevangelista@gmail.com" class="contact-btn">✉ Email Sean</a>
            <a href="sms:+15128005000" class="contact-btn">💬 Text</a>

  // Store leads globally for filtering
  window._allLeads = allLeads;

  // Animate numbers
  animateCount('hero-num', 0, totalThisMo, 800);
  animateCount('stat-lsa', 0, lsaThisMo.length, 600);
  animateCount('stat-calls', 0, callsThisMo.length, 600);

  // Wire chart tooltips
  initChartTooltips(dayBuckets);

// ── Number count-up ────────────────────────────────────────────────
function animateCount(id, from, to, duration) {
  const el = document.getElementById(id);
  if (!el || to === 0) return;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(from + (to - from) * ease);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Lead filter ────────────────────────────────────────────────────
function filterLeads(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('leads-list').innerHTML = renderLeads(window._allLeads, type);
}

function renderLeads(leads, filter) {
  const filtered = filter === 'all' ? leads : leads.filter(l => l.source === filter);
  if (!filtered.length) return `<div class="empty-state"><div class="empty-icon">📭</div><strong>No leads yet</strong>Leads will appear here as they come in.</div>`;
  return filtered.slice(0, 50).map(l => {
    const d = new Date(l.date);
    const label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const icon = l.source === 'lsa' ? '📢' : '📞';
    const phone = l.phone ? `<a href="tel:${l.phone}" class="lead-phone">${l.phone}</a>` : '<span style="color:var(--text3);font-size:12px">—</span>';
    return `<div class="lead-row">
      <div class="lead-date">${label}</div>
      <div class="lead-main">
        <div class="lead-source ${l.source}">${icon}</div>
        <div>
          <div class="lead-name">${l.name}</div>
          <div class="lead-type">${l.type}</div>
        </div>
      </div>
      ${phone}
    </div>`;
  }).join('');
}

// ── Bar chart ──────────────────────────────────────────────────────
function buildChart(dayBuckets) {
  const keys = Object.keys(dayBuckets);
  const vals = keys.map(k => dayBuckets[k]);
  const maxV = Math.max(...vals, 1);
  const W = 900, H = 80, pad = 4;
  const bw = (W - pad * (keys.length - 1)) / keys.length;
  const today = new Date().toISOString().split('T')[0];

  const bars = keys.map((k, i) => {
    const v = vals[i];
    const h = Math.max(v / maxV * H, v > 0 ? 3 : 1);
    const x = i * (bw + pad);
    const y = H - h;
    const isToday = k === today;
    const delay = (i / keys.length * 0.4).toFixed(2);
    return `<rect class="chart-bar${isToday ? ' today' : ''}" x="${x}" y="${y}" width="${bw}" height="${h}"
      rx="2" data-date="${k}" data-val="${v}" style="animation-delay:${delay}s"/>`;
  });

  // X-axis labels: show every 7 days
  const labels = keys.map((k, i) => {
    if (i % 7 !== 0 && i !== keys.length - 1) return '';
    const d = new Date(k + 'T12:00:00');
    const lbl = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const x = i * (bw + pad) + bw / 2;
    return `<text class="chart-label" x="${x}" y="${H + 14}" text-anchor="middle">${lbl}</text>`;
  });

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H + 20}" preserveAspectRatio="none"
    style="height:90px;transform-origin:bottom">
    ${bars.join('')}${labels.join('')}
  </svg>`;
}

function initChartTooltips(dayBuckets) {
  const tip = document.getElementById('chart-tip');
  document.querySelectorAll('.chart-bar').forEach(bar => {
    bar.addEventListener('mousemove', e => {
      const date = bar.dataset.date;
      const val  = bar.dataset.val;
      const d = new Date(date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      tip.textContent = `${label}: ${val} lead${val != 1 ? 's' : ''}`;
      tip.style.left = (e.pageX + 12) + 'px';
      tip.style.top  = (e.pageY - 32) + 'px';
      tip.style.opacity = '1';
    });
    bar.addEventListener('mouseleave', () => { tip.style.opacity = '0'; });
  });
}

async function portalSignOut() {

sb.auth.getSession().then(({ data: { session } }) => { if (session) showPortal(); });
