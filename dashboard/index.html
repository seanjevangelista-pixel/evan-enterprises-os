<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Evan Enterprises LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0A;
    --white: #FFFFFF;
    --silver: #C8C8C8;
    --silver-light: #E8E8E8;
    --silver-dark: #888888;
    --accent: #4A90D9;
    --accent-dim: rgba(74,144,217,0.12);
    --surface: #111111;
    --surface-2: #181818;
    --surface-3: #222222;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text-primary: #F0F0F0;
    --text-secondary: #999999;
    --text-muted: #555555;
    --radius: 12px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Inter', sans-serif;
    --green: #34C759;
    --red: #FF3B30;
    --yellow: #FFD60A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--text-muted); font-size: 14px; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="loading" id="app-loading">LOADING DASHBOARD…</div>

<!-- Dashboard UI built in Phase 2 -->
<script type="module">
  import '../js/supabase.js';
  document.getElementById('app-loading').textContent = 'DASHBOARD COMING IN PHASE 2';
</script>
</body>
</html>
