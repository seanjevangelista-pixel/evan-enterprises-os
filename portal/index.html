<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Evan Enterprises LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0A; --white: #FFFFFF; --accent: #4A90D9;
    --surface: #111111; --border: rgba(255,255,255,0.08);
    --text-primary: #F0F0F0; --text-secondary: #999999; --text-muted: #555555;
    --radius: 12px; --font-display: 'Syne', sans-serif; --font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--text-muted); font-size: 14px; letter-spacing: 0.1em; }
</style>
</head>
